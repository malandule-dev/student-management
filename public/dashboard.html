<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    :root{--bg:#060910;--bg2:#0c1120;--accent:#00e5ff;--accent2:#7b61ff;--text:#e8eaf0;--muted:#7a8499;--card:#0f1826;--border:rgba(0,229,255,0.12);--danger:#ff6b6b;--success:#00e5aa;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    h1,h2,h3{font-family:'Syne',sans-serif;}
    nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;position:sticky;top:0;z-index:10;}
    .logo{font-family:'Syne',sans-serif;font-weight:800;color:var(--accent);font-size:1rem;}
    .logo span{color:var(--text);}
    .nav-right{display:flex;align-items:center;gap:1rem;}
    .nav-right span{font-size:.85rem;color:var(--muted);}
    .nav-right strong{color:var(--text);}
    .logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:.4rem 1rem;border-radius:6px;cursor:pointer;font-size:.83rem;transition:all .2s;}
    .logout-btn:hover{border-color:var(--danger);color:var(--danger);}
    .layout{display:flex;min-height:calc(100vh - 61px);}
    .sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);padding:1.5rem 0;flex-shrink:0;}
    .sidebar-item{display:flex;align-items:center;gap:.8rem;padding:.75rem 1.5rem;cursor:pointer;color:var(--muted);font-size:.88rem;font-weight:500;transition:all .2s;border-left:3px solid transparent;text-decoration:none;}
    .sidebar-item:hover{color:var(--text);background:rgba(0,229,255,.05);}
    .sidebar-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(0,229,255,.07);}
    .sidebar-item i{width:18px;text-align:center;}
    .main{flex:1;padding:2rem;}
    .panel{display:none;}
    .panel.active{display:block;}
    .panel-title{font-size:1.3rem;font-weight:800;margin-bottom:1.5rem;}
    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:2rem;}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;text-align:center;}
    .stat-card .val{font-size:2rem;font-weight:800;font-family:'Syne',sans-serif;color:var(--accent);}
    .stat-card .lbl{font-size:.78rem;color:var(--muted);margin-top:.3rem;}
    .tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:2rem;}
    table{width:100%;border-collapse:collapse;}
    th{background:var(--bg2);font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:.9rem 1.2rem;text-align:left;}
    td{padding:.85rem 1.2rem;border-top:1px solid var(--border);font-size:.87rem;vertical-align:top;}
    tr:hover td{background:rgba(0,229,255,.03);}
    .grade-badge{display:inline-block;font-size:.75rem;font-weight:700;padding:.2rem .7rem;border-radius:100px;}
    .grade-A{background:rgba(0,229,170,.15);color:var(--success);}
    .grade-B{background:rgba(0,229,255,.15);color:var(--accent);}
    .grade-C{background:rgba(123,97,255,.15);color:var(--accent2);}
    .grade-D{background:rgba(255,165,0,.15);color:orange;}
    .grade-E,.grade-F{background:rgba(255,107,107,.15);color:var(--danger);}
    .filter-row{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
    .filter-btn{padding:.4rem 1rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.82rem;cursor:pointer;transition:all .2s;}
    .filter-btn.active{background:var(--accent);color:#060910;border-color:var(--accent);font-weight:700;}
    .progress-wrap{background:var(--bg2);border-radius:100px;height:8px;width:100%;min-width:80px;}
    .progress-bar{height:8px;border-radius:100px;background:var(--accent);transition:width .3s;}
    .chat-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;max-width:700px;}
    .chat-messages{height:400px;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;}
    .chat-bubble{max-width:75%;padding:.75rem 1rem;border-radius:12px;font-size:.88rem;line-height:1.5;}
    .bubble-student{background:var(--accent);color:#060910;align-self:flex-end;border-bottom-right-radius:4px;}
    .bubble-teacher{background:var(--bg2);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid var(--border);}
    .bubble-meta{font-size:.72rem;margin-top:.3rem;opacity:.7;}
    .chat-input-row{display:flex;gap:.5rem;padding:1rem;border-top:1px solid var(--border);}
    .chat-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;}
    .chat-input:focus{border-color:var(--accent);}
    .send-btn{background:var(--accent);color:#060910;border:none;border-radius:8px;padding:.75rem 1.2rem;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;transition:background .2s;}
    .send-btn:hover{background:#33eaff;}
    .empty-state{text-align:center;padding:3rem;color:var(--muted);}
    .download-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.8rem;background:var(--accent);color:#060910;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:.87rem;cursor:pointer;transition:background .2s;}
    .download-btn:hover{background:#33eaff;}
    .download-btn:disabled{opacity:.6;cursor:not-allowed;}
    .profile-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:2rem;max-width:500px;margin-bottom:1.5rem;}
    .profile-row{display:flex;justify-content:space-between;padding:.7rem 0;border-bottom:1px solid var(--border);}
    .profile-row:last-child{border-bottom:none;}
    .profile-label{color:var(--muted);font-size:.88rem;}
    .profile-value{font-weight:600;font-size:.88rem;}
  </style>
</head>
<body>

<nav>
  <span class="logo">SMS<span> — School</span></span>
  <div class="nav-right">
    <span>Welcome, <strong id="student-name"></strong></span>
    <button class="logout-btn" onclick="doLogout()"><i class="fa fa-sign-out"></i> Logout</button>
  </div>
</nav>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-item active" onclick="switchPanel('marks', this)"><i class="fa fa-bar-chart"></i> My Marks</div>
    <div class="sidebar-item" onclick="switchPanel('chat', this)"><i class="fa fa-comments"></i> Chat Teacher</div>
    <div class="sidebar-item" onclick="switchPanel('profile', this)"><i class="fa fa-user"></i> My Profile</div>
  </div>
  <div class="main">

    <!-- MARKS PANEL -->
    <div class="panel active" id="panel-marks">
      <h2 class="panel-title"><i class="fa fa-bar-chart" style="color:var(--accent);margin-right:.5rem;"></i>My Marks</h2>
      <div class="stats-row">
        <div class="stat-card"><div class="val" id="stat-avg">—</div><div class="lbl">Average %</div></div>
        <div class="stat-card"><div class="val" id="stat-highest">—</div><div class="lbl">Highest Mark</div></div>
        <div class="stat-card"><div class="val" id="stat-subjects">—</div><div class="lbl">Subjects</div></div>
        <div class="stat-card"><div class="val" id="stat-as">—</div><div class="lbl">A Grades</div></div>
      </div>
      <div class="filter-row" id="term-filters"></div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Subject</th><th>Term</th><th>Mark</th><th>Total</th><th>%</th><th>Progress</th><th>Grade</th></tr></thead>
          <tbody id="marks-body"><tr><td colspan="7" class="empty-state">Loading marks...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- CHAT PANEL -->
    <div class="panel" id="panel-chat">
      <h2 class="panel-title"><i class="fa fa-comments" style="color:var(--accent);margin-right:.5rem;"></i>Chat with Teacher</h2>
      <div class="chat-wrap">
        <div class="chat-messages" id="chat-messages">
          <div class="empty-state"><i class="fa fa-comments" style="font-size:2rem;margin-bottom:.5rem;display:block;"></i>No messages yet. Say hello!</div>
        </div>
        <div class="chat-input-row">
          <input type="text" class="chat-input" id="chat-input" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendMessage()">
          <button class="send-btn" onclick="sendMessage()"><i class="fa fa-paper-plane"></i></button>
        </div>
      </div>
    </div>

    <!-- PROFILE PANEL -->
    <div class="panel" id="panel-profile">
      <h2 class="panel-title"><i class="fa fa-user" style="color:var(--accent);margin-right:.5rem;"></i>My Profile</h2>
      <div class="profile-card" id="profile-card">
        <div class="profile-row"><span class="profile-label">Full Name</span><span class="profile-value" id="p-name">—</span></div>
        <div class="profile-row"><span class="profile-label">Role</span><span class="profile-value" style="color:var(--accent);">Student</span></div>
        <div class="profile-row"><span class="profile-label">Student ID</span><span class="profile-value" id="p-id">—</span></div>
        <div class="profile-row"><span class="profile-label">Email</span><span class="profile-value" id="p-email">—</span></div>
      </div>
      <div style="margin-top:.5rem;">
        <button class="download-btn" id="download-btn" onclick="downloadReportCard()">
          <i class="fa fa-download"></i> Download Report Card (PDF)
        </button>
      </div>
    </div>

  </div>
</div>

<script>
  const token = localStorage.getItem('sms_token');
  const user  = JSON.parse(localStorage.getItem('sms_user') || '{}');

  if (!token || user.role !== 'student') {
    window.location.href = '/';
  }

  document.getElementById('student-name').textContent = user.name || 'Student';

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  }

  function doLogout() {
    localStorage.removeItem('sms_token');
    localStorage.removeItem('sms_user');
    window.location.href = '/';
  }

  function switchPanel(name, el) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
    document.getElementById(`panel-${name}`).classList.add('active');
    el.classList.add('active');
    if (name === 'chat') loadMessages();
    if (name === 'profile') loadProfile();
  }

  let allMarks = [];
  let activeTerm = 'All';

  async function loadMarks() {
    const tbody = document.getElementById('marks-body');
    try {
      const res  = await fetch('/api/marks', { headers: authHeaders() });
      allMarks   = await res.json();
      if (allMarks.length) {
        const avg      = Math.round(allMarks.reduce((s, m) => s + (m.mark/m.total*100), 0) / allMarks.length);
        const highest  = Math.max(...allMarks.map(m => Math.round(m.mark/m.total*100)));
        const subjects = [...new Set(allMarks.map(m => m.subject))].length;
        const as       = allMarks.filter(m => m.grade === 'A').length;
        document.getElementById('stat-avg').textContent      = avg + '%';
        document.getElementById('stat-highest').textContent  = highest + '%';
        document.getElementById('stat-subjects').textContent = subjects;
        document.getElementById('stat-as').textContent       = as;
      }
      const terms = ['All', ...new Set(allMarks.map(m => m.term))];
      const filterRow = document.getElementById('term-filters');
      filterRow.innerHTML = terms.map(t =>
        `<button class="filter-btn ${t === activeTerm ? 'active' : ''}" onclick="filterByTerm('${t}', this)">${t}</button>`
      ).join('');
      renderMarks(allMarks);
    } catch {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Failed to load marks.</td></tr>';
    }
  }

  function filterByTerm(term, el) {
    activeTerm = term;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    const filtered = term === 'All' ? allMarks : allMarks.filter(m => m.term === term);
    renderMarks(filtered);
  }

  function renderMarks(marks) {
    const tbody = document.getElementById('marks-body');
    if (!marks.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No marks found.</td></tr>';
      return;
    }
    tbody.innerHTML = marks.map(m => {
      const pct = Math.round((m.mark / m.total) * 100);
      return `
        <tr>
          <td style="font-weight:600;">${m.subject}</td>
          <td style="color:var(--muted);">${m.term}</td>
          <td style="font-weight:700;color:var(--accent);">${m.mark}</td>
          <td style="color:var(--muted);">${m.total}</td>
          <td style="font-weight:600;">${pct}%</td>
          <td>
            <div class="progress-wrap">
              <div class="progress-bar" style="width:${pct}%;background:${pct>=70?'var(--success)':pct>=50?'var(--accent)':'var(--danger)'};"></div>
            </div>
          </td>
          <td><span class="grade-badge grade-${m.grade}">${m.grade}</span></td>
        </tr>`;
    }).join('');
  }

  async function loadMessages() {
    const container = document.getElementById('chat-messages');
    try {
      const res  = await fetch('/api/messages', { headers: authHeaders() });
      const msgs = await res.json();
      if (!msgs.length) {
        container.innerHTML = '<div class="empty-state"><i class="fa fa-comments" style="font-size:2rem;margin-bottom:.5rem;display:block;"></i>No messages yet. Say hello!</div>';
        return;
      }
      container.innerHTML = msgs.map(m => {
        const isMe = m.role === 'student';
        const time = new Date(m.created_at).toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });
        return `
          <div class="chat-bubble ${isMe ? 'bubble-student' : 'bubble-teacher'}">
            ${m.message}
            <div class="bubble-meta">${isMe ? 'You' : m.sender_name} · ${time}</div>
          </div>`;
      }).join('');
      container.scrollTop = container.scrollHeight;
    } catch {}
  }

  async function sendMessage() {
    const input   = document.getElementById('chat-input');
    const message = input.value.trim();
    if (!message) return;
    input.value = '';
    try {
      await fetch('/api/messages', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ message })
      });
      loadMessages();
    } catch {}
  }

  function loadProfile() {
    document.getElementById('p-name').textContent  = user.name || '—';
    document.getElementById('p-id').textContent    = user.student_id || '—';
    document.getElementById('p-email').textContent = user.email || '—';
  }

  function downloadReportCard() {
    const btn = document.getElementById('download-btn');
    btn.innerHTML  = '<i class="fa fa-spinner fa-spin"></i> Generating...';
    btn.disabled   = true;
    fetch('/api/report-card', { headers: authHeaders() })
      .then(res => {
        if (!res.ok) throw new Error('Failed');
        return res.blob();
      })
      .then(blob => {
        const url  = window.URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `report-card-${user.name || 'student'}.pdf`;
        a.click();
        window.URL.revokeObjectURL(url);
        btn.innerHTML = '<i class="fa fa-download"></i> Download Report Card (PDF)';
        btn.disabled  = false;
      })
      .catch(() => {
        alert('Failed to generate report card. Please try again.');
        btn.innerHTML = '<i class="fa fa-download"></i> Download Report Card (PDF)';
        btn.disabled  = false;
      });
  }

  loadMarks();
</script>
</body>
</html>
